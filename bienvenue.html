    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue | Marko</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/bienvenue.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="welcome-wrapper" id="bg-wrapper">
        <div class="welcome-content" id="content-to-fade">
            <img src="IMAGE/IMG_2701.jpg" alt="Photo de Marko" class="welcome-photo" id="photo-zoom">
            
            <h1 class="welcome-title">Bienvenue dans le portfolio de Marko 👋</h1>
            
            <a href="#" class="access-btn" onclick="runTransition(event)">Accéder au portfolio →</a>
        </div>
    </div>

    <script>
        function runTransition(e) {
            e.preventDefault(); // Empêche le saut de page immédiat
            
            const photo = document.getElementById('photo-zoom');
            const content = document.getElementById('content-to-fade');
            
            // On lance l'animation de zoom
            photo.classList.add('active-zoom');
            // On fait disparaître le texte
            content.classList.add('fade-out-content');

            // On attend 800ms (la durée du zoom) avant de changer de page
            setTimeout(() => {
                window.location.href = "index.html";
            }, 800);
        }
    </script>

</body>
</html>
